name: Collect Universal Wait Times

on:
  schedule:
    - cron: '0 * * * *'  # every hour
  workflow_dispatch:

jobs:
  scrape-parks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas requests

      - name: Run scraper
        run: python scraper.py

      - name: Commit and force push CSV
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add wait_times.csv
          git commit -m "Update wait times" || echo "No changes"

          # Force push to overwrite remote branch
          git push --force origin main
